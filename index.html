
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Velatra</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/VLMLPbh9/Design-sans-titre.png" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/VLMLPbh9/Design-sans-titre.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="Velatra">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
      
      :root {
        --velatra-red: #10b981;
        --velatra-red-dark: #059669;
      }

      body {
        background-color: #ffffff;
        color: #18181b;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        letter-spacing: 0.03em;
        line-height: 1.6;
        font-weight: 400;
        margin: 0;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        min-height: 100vh;
      }

      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Outfit', sans-serif;
      }

      .premium-gradient {
        background: linear-gradient(135deg, #f4f4f5 0%, #ffffff 100%);
      }

      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .glass-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0%, rgba(250, 250, 250, 0.7) 100%);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05), 0 0 20px rgba(16, 185, 129, 0.03);
      }

      .font-mono-timer {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Transitions */
      .page-transition {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
      }

      /* Active scaling for buttons */
      button:active {
        transform: scale(0.97);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              serif: ['Cormorant Garamond', 'serif'],
            },
            colors: {
              velatra: {
                bg: '#ffffff',
                bgLight: '#fafafa',
                bgCard: '#ffffff',
                border: '#e4e4e7',
                accent: '#10b981',
                accentDark: '#059669',
                textMuted: '#71717a',
                textDark: '#18181b',
                success: '#10b981',
                warning: '#f59e0b',
                blue: '#3b82f6',
                pink: '#ec4899',
                purple: '#a855f7',
                orange: '#f97316',
                coaching: '#10b981'
              }
            }
          }
        }
      }
    </script>

}
</script>
