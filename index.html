
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Velatra</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="Velatra">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
      
      :root {
        --velatra-red: #6366f1;
        --velatra-red-dark: #4338ca;
      }

      body {
        background-color: #050505;
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(67, 56, 202, 0.08) 0%, transparent 50%);
        color: #ffffff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        margin: 0;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        min-height: 100vh;
      }

      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Outfit', sans-serif;
      }

      .premium-gradient {
        background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
      }

      .glass {
        background: rgba(15, 15, 15, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .glass-card {
        background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(15, 15, 15, 0.7) 100%);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.03);
      }

      .font-mono-timer {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Transitions */
      .page-transition {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Active scaling for buttons */
      button:active {
        transform: scale(0.97);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              velatra: {
                bg: '#050505',
                bgLight: '#0f0f0f',
                bgCard: '#121212',
                border: '#222222',
                accent: '#6366f1',
                accentDark: '#4f46e5',
                textMuted: '#8b8b8b',
                textDark: '#ffffff',
                success: '#10b981',
                warning: '#f59e0b',
                blue: '#3b82f6',
                pink: '#ec4899',
                purple: '#a855f7',
                orange: '#f97316',
                coaching: '#6366f1'
              }
            }
          }
        }
      }
    </script>

{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>

</head>

</body>
</html>
